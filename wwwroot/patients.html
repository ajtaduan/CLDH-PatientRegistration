<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CLDH Patient Management</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container" style="width: 800px;">
        <div class="top-bar">
            <h2>Patient Records</h2>
            <div>
                <span id="welcomeMsg"></span>
                <button id="logoutBtn" style="width:auto; margin-left:1rem;">Logout</button>
            </div>
        </div>

    <button id="addBtn" style="width:auto;">+ Add Patient</button>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Birth Date</th>
                <th>Gender</th>
                <th>Contact</th>
                <th>Address</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="patientTableBody"></tbody>
    </table>
   </div>

    <!-- Simple modal form for add/edit-->>
    <div id="formModal" style="display:none; position: fixed; top: 0; left: 0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center;">
        <div class="contaier" style="width:350px;">
            <h3 id="formTitle">Add Patient</h3>
            <form id="patientForm">
                <input type="hidden" id="patientId">

                <label>Full Name</label>
                <input type="text" id="fullName" required>

                <label>Birth Date</label>
                <input type="date" id="birthDate" required>

                <label>Gender</label>
                <select id="gender" required>
                    <option value="">-- Select --</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>

                <label>Contact Number</label>
                <input type="text" id="contactNumber" required>

                <label>Address</label>
                <input type="text" id="address" required>

                <button type="submit">Save</button>
                <button type="button" id="cancelBtn" style="background:#999; margin-top:0.5rem;">Cancel</button>
                <p id="formError" class="error"></p>
            </form>
        </div>
    </div>

    <script src="js/patient.js"></script>
</body>
</html>
